<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratimux Muxonomy — The Circle's Face is a Manifold</title>
  <meta name="description" content="An interactive geometric proof establishing Diameter, Demometer, and Muxameter — the measurement framework of the Suite Cascade System (ARIOS).">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; background:#0d0d1a;">
  <div id="root"></div>
  <script type="text/babel">
const { useState, useRef } = React;


const C = {
  bg: "#0d0d1a", sf: "#16162a", sl: "#1e1e3a",
  tx: "#e8e6e3", tm: "#9997a0",
  ac: "#cc7722", di: "#ff6b4a", de: "#4ac1ff",
  mx: "#4affcf", am: "#9966cc", rs: "#ff007f",
  like: "#4affcf", unlike: "#ff007f",
};

const PI = Math.PI;
const polyVerts = (M) => Array.from({ length: M }, (_, k) => {
  const a = 2 * PI * k / M - PI / 2;
  return [Math.cos(a), Math.sin(a)];
});
const chords = (() => {
  const c = [2]; let s = Math.sqrt(2);
  for (let i = 1; i <= 12; i++) { c.push(s); s = Math.sqrt(2 - Math.sqrt(4 - s * s)); }
  return c;
})();
const piApprox = (n) => n === 0 ? 2 : Math.pow(2, n + 1) * chords[n] / 2;
const arcLen = (n) => 2 * PI / Math.pow(2, n + 1);

function Nav({ active, onNav }) {
  const labels = ["Origin", "I. ½ Dyad", "II. Finite", "III. Validate", "IV. Order", "V. Minimal", "VI. Muxonomy", "VII. Taxonomy"];
  return (
    <div style={{ display: "flex", gap: 3, overflowX: "auto", padding: "0 0 10px", marginBottom: 14, borderBottom: `1px solid ${C.sl}` }}>
      {labels.map((l, i) => (
        <button key={i} onClick={() => onNav(i)} style={{
          background: active === i ? C.ac : "transparent", color: active === i ? C.bg : C.tm,
          border: `1px solid ${active === i ? C.ac : C.sl}`, borderRadius: 6,
          padding: "4px 7px", fontSize: 8, fontWeight: 700, cursor: "pointer",
          fontFamily: "'Orbitron', sans-serif", whiteSpace: "nowrap", flexShrink: 0,
        }}>{l}</button>
      ))}
    </div>
  );
}

function Card({ color, children }) {
  return <div style={{ background: `${color}10`, border: `1px solid ${color}33`, borderRadius: 12, padding: 14, marginBottom: 12 }}>{children}</div>;
}

function STitle({ num, title, sub }) {
  return (
    <div style={{ marginBottom: 14, textAlign: "center" }}>
      {num && <div style={{ fontSize: 10, color: C.am, fontFamily: "'Orbitron', sans-serif", fontWeight: 700, letterSpacing: "2px" }}>SECTION {num}</div>}
      <div style={{ fontSize: 15, color: C.tx, fontFamily: "'Orbitron', sans-serif", fontWeight: 900, marginTop: 4 }}>{title}</div>
      {sub && <div style={{ fontSize: 10, color: C.tm, marginTop: 4, lineHeight: 1.5 }}>{sub}</div>}
    </div>
  );
}

function Slider({ value, min, max, onChange, label }) {
  return (
    <div style={{ textAlign: "center", margin: "10px 0" }}>
      <div style={{ fontSize: 10, color: C.tm, marginBottom: 4 }}>{label}: <span style={{ color: C.ac, fontWeight: 700, fontSize: 14 }}>{value}</span></div>
      <input type="range" min={min} max={max} value={value} onChange={e => onChange(+e.target.value)} style={{ width: "80%", accentColor: C.ac }} />
    </div>
  );
}

// ─── SECTION I: ½ DYAD — ORDERS OF DYADIC DIAMETERS ───
function DyadicDiameterProof() {
  const [n, setN] = useState(0);
  const D = Math.pow(2, n);
  const M = 2 * D;
  const theta = 180 / D;
  const cx = 120, cy = 120, r = 95;

  return (
    <div>
      <STitle num="I" title="The ½ Diametric Dyad" sub="The Diameter produces the Demometers — the base definition of Through Measure" />
      <svg viewBox="0 0 240 240" style={{ width: "100%", maxWidth: 260, display: "block", margin: "0 auto" }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={`${C.tm}44`} strokeWidth={1.5} />
        {/* Draw sectors */}
        {Array.from({ length: M }, (_, i) => {
          const a1 = 2 * PI * i / M - PI / 2;
          const a2 = 2 * PI * (i + 1) / M - PI / 2;
          const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
          const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
          const lg = (a2 - a1) > PI ? 1 : 0;
          return <path key={`s${i}`} d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z`}
            fill={`${C.de}${n === 0 ? '18' : '10'}`} stroke={`${C.mx}44`} strokeWidth={0.5} />;
        })}
        {/* Draw diameters */}
        {Array.from({ length: D }, (_, i) => {
          const a = PI * i / D - PI / 2;
          return <line key={`d${i}`} x1={cx + r * Math.cos(a)} y1={cy + r * Math.sin(a)}
            x2={cx - r * Math.cos(a)} y2={cy - r * Math.sin(a)}
            stroke={C.di} strokeWidth={n === 0 ? 3 : 1.5} opacity={0.7} />;
        })}
        <circle cx={cx} cy={cy} r={3} fill={C.ac} />
        {n === 0 && <text x={cx} y={cy - 8} textAnchor="middle" fill={C.di} fontSize="11"
          fontWeight="900" fontFamily="'Orbitron', sans-serif" opacity={0.6}>2r</text>}
      </svg>

      {/* Stepper */}
      <div style={{ display: "flex", justifyContent: "center", gap: 4, margin: "10px 0" }}>
        {[0, 1, 2, 3, 4, 5, 6, 7].map(i => (
          <button key={i} onClick={() => setN(i)} style={{
            width: 34, height: 34, borderRadius: 8,
            background: n === i ? C.mx : "transparent",
            color: n === i ? C.bg : C.mx,
            border: `1.5px solid ${n === i ? C.mx : `${C.mx}44`}`,
            fontFamily: "'Orbitron', sans-serif", fontSize: 12, fontWeight: 900, cursor: "pointer",
          }}>{i}</button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 8 }}>
        <div style={{ background: `${C.di}11`, border: `1px solid ${C.di}33`, borderRadius: 8, padding: 8, textAlign: "center" }}>
          <div style={{ fontSize: 8, color: C.di, fontFamily: "'Orbitron', sans-serif", fontWeight: 700 }}>DIAMETERS</div>
          <div style={{ fontSize: 18, fontWeight: 900, color: C.tx, fontFamily: "'Orbitron', sans-serif" }}>{D}</div>
          <div style={{ fontSize: 8, color: C.tm }}>2<sup>{n}</sup></div>
        </div>
        <div style={{ background: `${C.de}11`, border: `1px solid ${C.de}33`, borderRadius: 8, padding: 8, textAlign: "center" }}>
          <div style={{ fontSize: 8, color: C.de, fontFamily: "'Orbitron', sans-serif", fontWeight: 700 }}>DEMOMETERS</div>
          <div style={{ fontSize: 18, fontWeight: 900, color: C.tx, fontFamily: "'Orbitron', sans-serif" }}>{M}</div>
          <div style={{ fontSize: 8, color: C.tm }}>2<sup>{n + 1}</sup></div>
        </div>
        <div style={{ background: `${C.ac}11`, border: `1px solid ${C.ac}33`, borderRadius: 8, padding: 8, textAlign: "center" }}>
          <div style={{ fontSize: 8, color: C.ac, fontFamily: "'Orbitron', sans-serif", fontWeight: 700 }}>θ / SECTOR</div>
          <div style={{ fontSize: 16, fontWeight: 900, color: C.tx, fontFamily: "'Orbitron', sans-serif" }}>{theta}°</div>
          <div style={{ fontSize: 8, color: C.tm }}>180°/2<sup>{n}</sup></div>
        </div>
      </div>

      {/* Description */}
      <div style={{ background: C.sf, borderRadius: 10, padding: 12, marginTop: 10, textAlign: "center",
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: C.tm, lineHeight: 1.7 }}>
        {n === 0 && <><span style={{ color: C.ac, fontWeight: 700 }}>½ Dyad — the base definition.</span><br />
          <span style={{ color: C.di }}>1 Diameter</span> = ½ Dyad of Diameters.<br />
          Each <span style={{ color: C.de }}>Demometer</span> = ½ the circle.<br />
          The Through Measure IS the definition.</>}
        {n === 1 && <><span style={{ color: C.mx }}>2 Diameters</span> perpendicular. <span style={{ color: C.de }}>4 equal quadrants</span>.<br />First doubling from the ½ Dyad base.</>}
        {n === 2 && <><span style={{ color: C.mx }}>4 Diameters</span>. <span style={{ color: C.de }}>8 equal 45° sectors</span>.<br />Second order. Each tier doubles the previous.</>}
        {n === 3 && <><span style={{ color: C.mx }}>8 Diameters</span>. <span style={{ color: C.de }}>16 equal 22.5° sectors</span>.<br />Third order. θ halves at each doubling.</>}
        {n === 4 && <><span style={{ color: C.mx }}>16 Diameters</span>. <span style={{ color: C.de }}>32 equal sectors</span>.<br />Fourth order. 11.25° per sector.</>}
        {n === 5 && <><span style={{ color: C.mx }}>32 Diameters</span>. <span style={{ color: C.de }}>64 equal sectors</span>.<br />Fifth order. 5.625° per sector.</>}
        {n === 6 && <><span style={{ color: C.mx }}>64 Diameters</span>. <span style={{ color: C.de }}>128 equal sectors</span>.<br />Sixth order. Beyond Archimedes' 96-gon.</>}
        {n === 7 && <><span style={{ color: C.mx }}>128 Diameters</span>. <span style={{ color: C.de }}>256 equal sectors</span>.<br />Seventh order. 1.40625° per sector. The polygon approaches the circle.</>}
      </div>

      {/* Invariants */}
      <div style={{ background: `${C.am}08`, border: `1px solid ${C.am}33`, borderRadius: 10, padding: 10, marginTop: 10, textAlign: "center",
        fontSize: 10, color: C.tx, lineHeight: 1.8 }}>
        <span style={{ color: C.am, fontWeight: 700, fontFamily: "'Orbitron', sans-serif", fontSize: 9, letterSpacing: "1px" }}>INVARIANT AT EVERY ORDER</span><br />
        <span style={{ color: C.de }}>M</span> = <span style={{ color: C.di }}>D</span> × 2 ·{" "}
        Dyads of <span style={{ color: C.de }}>M</span> = Dyads of <span style={{ color: C.di }}>D</span> × 2 ·{" "}
        <span style={{ color: C.ac }}>θ</span> halves each order
      </div>
    </div>
  );
}

// ─── SECTION II: SECTOR INSPECTOR ───
function SectorInspector() {
  const [n, setN] = useState(0);
  const D = Math.pow(2, n), M = 2 * D;
  const cx = 120, cy = 120, r = 95;
  const a1 = -PI / 2, a2 = -PI / 2 + 2 * PI / M;
  const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
  const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
  return (
    <div>
      <STitle num="II" title="The Finite Case" sub="At every finite order, sectors are Demometers — not Muxameters" />
      <svg viewBox="0 0 240 240" style={{ width: "100%", maxWidth: 260, display: "block", margin: "0 auto" }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.sl} strokeWidth={1} />
        {Array.from({ length: D }, (_, i) => {
          const a = PI * i / D - PI / 2;
          return <line key={i} x1={cx + r * Math.cos(a)} y1={cy + r * Math.sin(a)} x2={cx - r * Math.cos(a)} y2={cy - r * Math.sin(a)} stroke={`${C.di}44`} strokeWidth={0.8} />;
        })}
        <path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${M <= 2 ? 1 : 0} 1 ${x2},${y2} Z`} fill={`${C.de}20`} />
        <line x1={cx} y1={cy} x2={x1} y2={y1} stroke={C.like} strokeWidth={2.5} />
        <line x1={cx} y1={cy} x2={x2} y2={y2} stroke={C.like} strokeWidth={2.5} />
        <path d={`M${x1},${y1} A${r},${r} 0 ${M <= 2 ? 1 : 0} 1 ${x2},${y2}`} fill="none" stroke={C.unlike} strokeWidth={2.5} strokeDasharray="4 3" />
        <circle cx={cx} cy={cy} r={2.5} fill={C.di} />
      </svg>
      {/* Stepper matching Section I orders */}
      <div style={{ display: "flex", justifyContent: "center", gap: 4, margin: "10px 0" }}>
        {[0, 1, 2, 3, 4, 5, 6, 7].map(i => (
          <button key={i} onClick={() => setN(i)} style={{
            width: 34, height: 34, borderRadius: 8,
            background: n === i ? C.de : "transparent",
            color: n === i ? C.bg : C.de,
            border: `1.5px solid ${n === i ? C.de : `${C.de}44`}`,
            fontFamily: "'Orbitron', sans-serif", fontSize: 12, fontWeight: 900, cursor: "pointer",
          }}>{i}</button>
        ))}
      </div>
      <div style={{ textAlign: "center", fontSize: 11, lineHeight: 1.8 }}>
        <span style={{ color: C.tm, fontSize: 9 }}>Order {n}</span> · <span style={{ color: C.di }}>{D} Diameter{D > 1 ? "s" : ""}</span> · <span style={{ color: C.de }}>{M} Sector{M > 1 ? "s" : ""}</span><br />
        {n === 0
          ? <><span style={{ color: C.like }}>1 like edge</span> (diameter) + <span style={{ color: C.unlike }}>1 unlike edge</span> (semicircular arc)</>
          : <><span style={{ color: C.like }}>2 like edges</span> (radii) + <span style={{ color: C.unlike }}>1 unlike edge</span> (arc)</>}<br />
        <span style={{ color: C.tm, fontStyle: "italic" }}>Sector = Demometer (not Muxameter)</span>
      </div>
    </div>
  );
}

// ─── SECTION III: THE VALIDATING APPROACH ───
function ValidatingApproach() {
  const [step, setStep] = useState(1);
  const orders = [
    { n: 0, M: 2, label: "1st Order", desc: "2 points. 1 through-line. No connecting sides. No internal face. Defines but cannot compute.", canMux: false },
    { n: 1, M: 4, label: "2nd Order", desc: "4 points. 4 sides. s₄ = √2. The inscribed square. First internal Muxameters form.", canMux: true },
    { n: 2, M: 8, label: "3rd Order", desc: "8 points. 8 sides. Muxameters of Muxameters — a Manifold. Recursion: s = √(2-√(4-s²)).", canMux: true },
    { n: 3, M: 16, label: "4th Order", desc: "16 points. Each prior Muxameter bisected. The nesting deepens.", canMux: true },
  ];
  const o = orders[step];
  const cx = 110, cy = 110, r = 80;

  return (
    <div>
      <STitle num="III" title="The Validating Approach" sub="From the ½ Diametric Dyad — ground up from base, around Archimedes" />

      {/* Stacked visual: Viète on top, DD beneath */}
      <div style={{ background: C.sf, borderRadius: 12, overflow: "hidden", marginBottom: 14 }}>
        {/* VIÈTE LAYER */}
        <div style={{ padding: "12px 14px", borderBottom: `2px solid ${C.sl}` }}>
          <div style={{ fontSize: 9, color: C.co, fontFamily: "'Orbitron', sans-serif", fontWeight: 700, letterSpacing: "1px", marginBottom: 6, textAlign: "center" }}>
            VIÈTE (1593) — PRIOR WORK
          </div>
          <div style={{ fontSize: 10, color: C.tm, textAlign: "center", lineHeight: 1.8 }}>
            <span style={{ color: C.co }}>M</span> = polygon sides · Starting: <span style={{ color: C.co }}>M=4</span> (square, √2)<br />
            2/π = ∏(<span style={{ color: C.co }}>a<sub>n</sub></span>/2) · Infinite product → reciprocal<br />
            <span style={{ color: C.rs, fontSize: 9 }}>Lossy: computed via Archimedes' hexagonal method (6×2¹⁶) — formula disconnected from computation</span>
          </div>
        </div>
        {/* CONNECTION */}
        <div style={{ padding: "6px 0", textAlign: "center", background: `${C.di}08` }}>
          <span style={{ fontSize: 10, color: C.di, fontWeight: 700 }}>M is the same M</span>
        </div>
        {/* DYADIC DIAMETER LAYER */}
        <div style={{ padding: "12px 14px" }}>
          <div style={{ fontSize: 9, color: C.mx, fontFamily: "'Orbitron', sans-serif", fontWeight: 700, letterSpacing: "1px", marginBottom: 6, textAlign: "center" }}>
            DYADIC DIAMETER (2026) — VALIDATED FROM GROUND UP
          </div>
          <div style={{ fontSize: 10, color: C.tm, textAlign: "center", lineHeight: 1.8 }}>
            <span style={{ color: C.mx }}>M</span> = 2D = 2<sup>n+1</sup> · Derived from doubling the Through Measure<br />
            s<sub>new</sub> = √(2 - √(4 - s²)) · Pythagorean theorem × 2<br />
            π = lim <span style={{ color: C.mx }}>M</span> × s<sub>M</sub> / 2 · The constant directly<br />
            <span style={{ color: C.mx, fontSize: 9 }}>Ground up from the Diameter — around Archimedes, not through</span>
          </div>
        </div>
      </div>

      {/* Interactive: Muxameter formation by order */}
      <svg viewBox="0 0 220 220" style={{ width: "100%", maxWidth: 240, display: "block", margin: "0 auto" }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={`${C.tm}33`} strokeWidth={1} />
        {/* Draw polygon and internal triangles */}
        {o.canMux && (() => {
          const verts = Array.from({ length: o.M }, (_, k) => {
            const a = 2 * PI * k / o.M - PI / 2;
            return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
          });
          const tris = [];
          for (let i = 0; i < verts.length; i++) {
            const j = (i + 1) % verts.length;
            tris.push(<polygon key={`t${i}`} points={`${cx},${cy} ${verts[i][0]},${verts[i][1]} ${verts[j][0]},${verts[j][1]}`}
              fill={`${C.mx}12`} stroke={`${C.mx}33`} strokeWidth={0.5} />);
          }
          const edges = verts.map((v, i) => {
            const j = (i + 1) % verts.length;
            return <line key={`e${i}`} x1={v[0]} y1={v[1]} x2={verts[j][0]} y2={verts[j][1]}
              stroke={C.de} strokeWidth={2} />;
          });
          const dots = verts.map((v, i) =>
            <circle key={`v${i}`} cx={v[0]} cy={v[1]} r={3} fill={C.de} />);
          return <>{tris}{edges}{dots}</>;
        })()}
        {!o.canMux && (<>
          <line x1={cx - r} y1={cy} x2={cx + r} y2={cy} stroke={C.di} strokeWidth={3} />
          <circle cx={cx - r} cy={cy} r={4} fill={C.de} />
          <circle cx={cx + r} cy={cy} r={4} fill={C.de} />
          <text x={cx} y={cy - 12} textAnchor="middle" fill={C.rs} fontSize="8" fontFamily="'Orbitron', sans-serif" fontWeight="700">NO INTERNAL FACE</text>
        </>)}
        <circle cx={cx} cy={cy} r={2.5} fill={C.ac} />
      </svg>

      {/* Order stepper */}
      <div style={{ display: "flex", justifyContent: "center", gap: 6, margin: "10px 0" }}>
        {orders.map((ord, i) => (
          <button key={i} onClick={() => setStep(i)} style={{
            padding: "5px 10px", borderRadius: 6, fontSize: 9, fontWeight: 700, cursor: "pointer",
            fontFamily: "'Orbitron', sans-serif",
            background: step === i ? (ord.canMux ? C.mx : C.rs) : "transparent",
            color: step === i ? C.bg : (ord.canMux ? C.mx : C.rs),
            border: `1px solid ${step === i ? "transparent" : (ord.canMux ? `${C.mx}44` : `${C.rs}44`)}`,
          }}>{ord.label}</button>
        ))}
      </div>

      {/* Order description */}
      <div style={{ textAlign: "center", fontSize: 11, lineHeight: 1.7, marginTop: 6 }}>
        <span style={{ color: o.canMux ? C.mx : C.rs, fontWeight: 700 }}>M = {o.M}</span>
        {o.canMux && <> · <span style={{ color: C.mx }}>{o.M / 2} Muxameters</span> (triangles from center)</>}<br />
        <span style={{ color: C.tm, fontSize: 10 }}>{o.desc}</span>
      </div>

      {/* Key insight */}
      <div style={{ background: `${C.ac}10`, border: `1px solid ${C.ac}33`, borderRadius: 10, padding: 12, marginTop: 12, textAlign: "center",
        fontSize: 10, color: C.tx, lineHeight: 1.8 }}>
        <span style={{ color: C.ac, fontWeight: 700 }}>The prior work was lossy to the geometry.</span><br />
        <span style={{ color: C.tm }}>
          M derived from doubling the Through Measure produces the same recursion Viète published in 1593.
          The geometric abstractions were validated from the ground up, inline with reality.
          Viète's formula and computation were disconnected — the Dyadic Diameter framework unifies them.
          Each order is a Muxameter of Muxameters — a Manifold — nesting toward the circle's face.
        </span>
      </div>
    </div>
  );
}

// ─── SECTION IV: ORDER OF DIAMETER ───
function OrderOfDiameter() {
  const [shape, setShape] = useState("circle");
  const shapes = {
    circle: { l: "Circle", mc: "∞ → 1", mo: "ONE", mi: "All collapse to same", ma: "Any through center (2r)", c: C.de },
    square: { l: "Square", mc: "1 (H=V)", mo: "TWO", mi: "Mirror fold (One Order)", ma: "Diagonal — vertex to vertex", c: C.ac },
    rectangle: { l: "Rectangle", mc: "2 (H≠V)", mo: "THREE", mi: "Width + Height fold", ma: "Diagonal — corner to corner", c: C.di },
  };
  const s = shapes[shape];
  const cx = 120, cy = 110;
  return (
    <div>
      <STitle num="IV" title="Order of Diameter" sub="Shapes classified by how many distinct through-measures they contain" />
      <svg viewBox="0 0 240 220" style={{ width: "100%", maxWidth: 260, display: "block", margin: "0 auto" }}>
        {shape === "circle" && <g>
          <circle cx={cx} cy={cy} r={75} fill={`${s.c}11`} stroke={s.c} strokeWidth={2} />
          <line x1={45} y1={cy} x2={195} y2={cy} stroke={C.di} strokeWidth={2.5} strokeDasharray="6 3" />
          <circle cx={cx} cy={cy} r={3} fill={C.ac} />
          <circle cx={45} cy={cy} r={4} fill={C.di} /><circle cx={195} cy={cy} r={4} fill={C.di} />
          <text x={cx} y={cy - 10} textAnchor="middle" fill={C.di} fontSize="10" fontWeight="700" fontFamily="'IBM Plex Mono', monospace">2r — ONE Order</text>
        </g>}
        {shape === "square" && <g>
          <rect x={50} y={40} width={140} height={140} fill={`${s.c}11`} stroke={s.c} strokeWidth={2} />

// ─── SECTION VI: CONCEPTUAL SPACE ───
function ConceptualSpace() {
  const [hv, setHv] = useState(null);
  const [showMux, setSM] = useState(false);
  const concepts = [
    { x: 80, y: 65, l: "Botany", qs: ["Growth", "Cycles", "Systems"], c: "#4caf50" },
    { x: 250, y: 50, l: "Economics", qs: ["Growth", "Cycles", "Systems"], c: "#ff9800" },
    { x: 50, y: 180, l: "Music", qs: ["Harmony", "Cycles", "Pattern"], c: "#9c27b0" },
    { x: 270, y: 175, l: "Architecture", qs: ["Structure", "Systems", "Pattern"], c: "#2196f3" },
    { x: 165, y: 125, l: "Biology", qs: ["Growth", "Cycles", "Structure"], c: "#e91e63" },
  ];
  const dias = [];
  for (let i = 0; i < concepts.length; i++)
    for (let j = i + 1; j < concepts.length; j++) {
      const sh = concepts[i].qs.filter(q => concepts[j].qs.includes(q));
      if (sh.length > 0) dias.push({ from: i, to: j, shared: sh });
    }
  const muxs = [];
  for (let i = 0; i < concepts.length; i++)
    for (let j = i + 1; j < concepts.length; j++)
      for (let k = j + 1; k < concepts.length; k++) {
        if (dias.find(d => (d.from === i && d.to === j) || (d.from === j && d.to === i)) &&
          dias.find(d => (d.from === j && d.to === k) || (d.from === k && d.to === j)) &&
          dias.find(d => (d.from === i && d.to === k) || (d.from === k && d.to === i)))
          muxs.push({ v: [i, j, k] });
      }
  const actMux = hv !== null ? muxs.filter(m => m.v.includes(hv)) : (showMux ? muxs : []);

  return (
    <div>
      <STitle num="VI" title="Muxonomy" sub="The complete topology — Demometers composed through Diameters into a Manifold" />
      <svg viewBox="0 0 330 230" style={{ width: "100%", maxWidth: 340, display: "block", margin: "0 auto" }}>
        {actMux.map((m, i) => {
          const [a, b, c] = m.v.map(v => concepts[v]);
          return <polygon key={i} points={`${a.x},${a.y} ${b.x},${b.y} ${c.x},${c.y}`} fill={`${C.mx}12`} stroke={`${C.mx}44`} strokeWidth="1" />;
        })}
        {dias.map((d, i) => {
          const f = concepts[d.from], t = concepts[d.to];
          const h = hv === d.from || hv === d.to;
          const mx = (f.x + t.x) / 2, my = (f.y + t.y) / 2;
          return (<g key={i}>
            <line x1={f.x} y1={f.y} x2={t.x} y2={t.y} stroke={h ? C.di : `${C.di}33`} strokeWidth={h ? 2 : 1} />
            {h && <text x={mx} y={my - 6} textAnchor="middle" fill={C.di} fontSize="7" fontWeight="700" fontFamily="'IBM Plex Mono', monospace">{d.shared.join(", ")}</text>}
          </g>);
        })}
        {concepts.map((c, i) => (
          <g key={i} onMouseEnter={() => setHv(i)} onMouseLeave={() => setHv(null)} style={{ cursor: "pointer" }}>
            <circle cx={c.x} cy={c.y} r={hv === i ? 24 : 20} fill={`${c.c}22`} stroke={c.c} strokeWidth={hv === i ? 2.5 : 1.5} />
            <text x={c.x} y={c.y - 1} textAnchor="middle" fill={C.tx} fontSize="8" fontWeight="900" fontFamily="'Orbitron', sans-serif">{c.l}</text>
