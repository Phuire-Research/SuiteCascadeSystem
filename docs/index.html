function useInView(t = 0.12) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); o.disconnect(); } }, { threshold: t });
    o.observe(el);
    return () => o.disconnect();
  }, [t]);
  return [ref, v];
}

function Reveal({ children, delay = 0, style: extraStyle = {} }) {
  const [ref, v] = useInView();
  return (
    <div ref={ref} style={{
      opacity: v ? 1 : 0,
      transform: v ? "translateY(0)" : "translateY(24px)",
      transition: `opacity 0.6s cubic-bezier(0.22,1,0.36,1) ${delay}s, transform 0.6s cubic-bezier(0.22,1,0.36,1) ${delay}s`,
      ...extraStyle,
    }}>
      {children}
    </div>
  );
}

function CycleRing() {

  useEffect(() => { const t = setInterval(() => setA(i => (i + 1) % 8), 2200); return () => clearInterval(t); }, []);

  const ns = SUITES.map((s, i) => {
    const ang = (i / 8) * Math.PI * 2 - Math.PI / 2;
    return { ...s, x: cx + Math.cos(ang) * r, y: cy + Math.sin(ang) * r };
  });
  return (
    <div style={{ display: "flex", justifyContent: "center", padding: "8px 0" }}>
      <svg viewBox="0 0 400 400" width="300" height="300">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#ffffff08" strokeWidth={1} strokeDasharray="6 10" />
        {ns.map((n, i) => {
          const nx = ns[(i + 1) % 8];
          return <line key={i} x1={n.x} y1={n.y} x2={nx.x} y2={nx.y}
            stroke={i === a ? n.accent : "#ffffff0d"} strokeWidth={i === a ? 2 : 0.8}

        })}

              {act && <circle cx={n.x} cy={n.y} r={32} fill="none" stroke={n.accent} strokeWidth={0.6} opacity={0.3} />}

                fontWeight={act ? 700 : 400} fontFamily="'Orbitron', monospace"
                style={{ transition: "fill 0.3s" }}>{n.num}</text>
            </g>
          );
        })}

          fontSize={15} fontWeight={700} fontFamily="'Orbitron', monospace"

      </svg>
    </div>
  );

              <div style={{ background: "linear-gradient(150deg, #0d1520, #0a0a14)", border: "1px solid #b0d4f020", borderRadius: 18, padding: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", background: "#b0d4f00e", border: "1px solid #b0d4f025" }}>
                    <DiamondIcon size={16} color="#b0d4f0" />
                  </div>
                  <span style={{ color: "#b0d4f0", fontFamily: "'Orbitron', monospace", fontSize: 16, fontWeight: 700 }}>Diamond</span>
                </div>
                <p style={{ color: "#8888a0", fontSize: 13, lineHeight: 1.6, marginBottom: 10 }}>
                  The Ego document — what is planned, what is pending, current cycle position. Written to Memory at cycle boundaries.
                </p>
                <span style={{ color: "#b0d4f050", fontSize: 11 }}>Persists across conversations</span>
              </div>
            </Reveal>
            <Reveal delay={0.16}>
              <div style={{ background: "linear-gradient(150deg, #11101a, #0a0a14)", border: "1px solid #50506020", borderRadius: 18, padding: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", background: "#2a2a3a20", border: "1px solid #2a2a3a40" }}>
                    <Layers size={16} color="#8888a0" />
                  </div>
                  <span style={{ color: "#8888a0", fontFamily: "'Orbitron', monospace", fontSize: 16, fontWeight: 700 }}>Onyx</span>
                </div>
                <p style={{ color: "#8888a0", fontSize: 13, lineHeight: 1.6, marginBottom: 10 }}>
                  The Lambda document — what was found, what was diagnosed. The conversation itself IS the Onyx. Context compounds through the dialectic.
                </p>
                <span style={{ color: "#50506050", fontSize: 11 }}>Self-accumulates within each Rotation</span>
              </div>
            </Reveal>
          </div>
          <Reveal delay={0.22}>
            <div style={{ textAlign: "center", marginTop: 24 }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "#0d0d18", border: "1px solid #ffffff0c", padding: "8px 18px", borderRadius: 12 }}>
                <span style={{ color: "#b0d4f0", fontSize: 11, fontFamily: "'Orbitron', monospace" }}>Diamond</span>
                <span style={{ color: "#d4a843", fontSize: 13 }}>↔</span>
                <span style={{ color: "#8888a0", fontSize: 11, fontFamily: "'Orbitron', monospace" }}>Onyx</span>
                <span style={{ color: "#333", fontSize: 10 }}>=</span>
                <span style={{ color: "#d4a843", fontSize: 11, fontFamily: "'Orbitron', monospace", fontWeight: 600 }}>Renewable Intelligence</span>
              </div>
            </div>
          </Reveal>
        </div>
      </section>

      {/* OPERATIONAL SHIFT */}
      <section style={{ padding: "72px 24px", background: "#0a0a14" }}>
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <Reveal>
            <div style={{ textAlign: "center", marginBottom: 40 }}>
              <div style={{ color: "#e8874d", fontFamily: "'Orbitron', monospace", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 10 }}>Observed Effect</div>
              <h2 style={{ fontFamily: "'Orbitron', monospace", fontSize: "clamp(24px, 4vw, 36px)", fontWeight: 700, marginBottom: 10 }}>The Operational Shift</h2>
              <p style={{ color: "#5a5a70", fontSize: 13, maxWidth: 480, margin: "0 auto", lineHeight: 1.6 }}>
                Seven measurable differences between default operation and Cascade operation — not conceptual claims, but observable behavioral changes.
              </p>
            </div>
          </Reveal>

          {/* Split contrast header */}
          <Reveal delay={0.08}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 2, marginBottom: 32, borderRadius: 14, overflow: "hidden" }}>
              <div style={{ background: "#12121a", padding: "16px 20px", textAlign: "center" }}>
                <div style={{ color: "#555", fontFamily: "'Orbitron', monospace", fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>Default</div>
                <div style={{ color: "#666", fontSize: 12 }}>Collapsed · Linear · Ephemeral</div>
              </div>
              <div style={{ background: "linear-gradient(135deg, #1a1420, #14181e)", padding: "16px 20px", textAlign: "center", borderLeft: "2px solid #e8874d33" }}>
                <div style={{ color: "#e8874d", fontFamily: "'Orbitron', monospace", fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>Cascade</div>
                <div style={{ color: "#888", fontSize: 12 }}>Gated · Branching · Compounding</div>
              </div>
            </div>
          </Reveal>

          {/* Demometer chain */}
          <div style={{ position: "relative" }}>
            {/* Connecting line */}
            <div style={{
              position: "absolute", left: 19, top: 30, bottom: 30, width: 2,
              background: "linear-gradient(180deg, #c44d4d33, #e8874d33, #d44da833, #d4a84333, #b0d4f033, #e84d3033, #4dd47a33)",
              borderRadius: 1,
            }} />

            {DEMOMETERS.map((d, i) => (
              <Reveal key={d.num} delay={i * 0.06}>
                <div style={{ display: "flex", gap: 16, marginBottom: 16, position: "relative" }}>
                  {/* Node */}
                  <div style={{
                    width: 40, minWidth: 40, display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 14, zIndex: 1,
                  }}>
                    <div style={{
                      width: 22, height: 22, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                      background: "#0a0a14", border: `2px solid ${d.accent}66`, fontSize: 9, color: d.accent, fontWeight: 700, fontFamily: "'Orbitron', monospace",
                    }}>
                      {d.num}
                    </div>
                    <div style={{ marginTop: 4, fontSize: 7, color: `${d.accent}55`, fontFamily: "'Orbitron', monospace", textTransform: "uppercase", letterSpacing: "0.1em" }}>
                      {d.key}
                    </div>
                  </div>

                  {/* Card */}
                  <div style={{
                    flex: 1, background: "#0d0d16", border: `1px solid ${d.accent}18`,
                    borderRadius: 14, padding: "14px 18px", transition: "border-color 0.3s",
                  }}>
                    <div style={{ color: d.accent, fontFamily: "'Orbitron', monospace", fontSize: 12, fontWeight: 600, marginBottom: 10 }}>
                      {d.name}
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <div>
                        <div style={{ fontSize: 8, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4, fontFamily: "'Orbitron', monospace" }}>Default</div>
                        <p style={{ color: "#666", fontSize: 11.5, lineHeight: 1.5 }}>{d.before}</p>
                      </div>
                      <div style={{ borderLeft: `1px solid ${d.accent}15`, paddingLeft: 10 }}>
                        <div style={{ fontSize: 8, color: d.accent, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4, fontFamily: "'Orbitron', monospace" }}>Cascade</div>
                        <p style={{ color: "#999ab0", fontSize: 11.5, lineHeight: 1.5 }}>{d.after}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </Reveal>
            ))}
          </div>

          {/* Muxameter synthesis */}
          <Reveal delay={0.5}>
            <div style={{
              marginTop: 32, padding: "24px 28px", borderRadius: 16,
              background: "linear-gradient(135deg, #1a140e08, #0e141a08)",
              border: "1px solid #d4a84322",
              textAlign: "center", position: "relative", overflow: "hidden",
            }}>
              <div style={{
                position: "absolute", inset: 0, opacity: 0.04,
                background: "radial-gradient(circle at 50% 50%, #d4a843, transparent 70%)",
              }} />
              <div style={{ position: "relative", zIndex: 1 }}>
                <div style={{ color: "#d4a843", fontFamily: "'Orbitron', monospace", fontSize: 9, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 10 }}>
                  Muxameter — The Through Measure
                </div>
                <p style={{ color: "#bbb8c8", fontSize: 14, lineHeight: 1.7, fontStyle: "italic", maxWidth: 560, margin: "0 auto" }}>
                  {MUXAMETER}
                </p>
              </div>
            </div>
          </Reveal>
        </div>
      </section>

      {/* PRINCIPLES */}
      <section style={{ padding: "72px 24px", background: "#0a0a14" }}>
        <div style={{ maxWidth: 640, margin: "0 auto" }}>
          <Reveal>
            <h2 style={{ fontFamily: "'Orbitron', monospace", fontSize: "clamp(24px, 4vw, 36px)", fontWeight: 700, textAlign: "center", marginBottom: 36 }}>Operational Principles</h2>
          </Reveal>
          {PRINCIPLES.map((p, i) => (
            <Reveal key={i} delay={i * 0.08}>
              <div style={{ display: "flex", gap: 16, marginBottom: 28 }}>
                <div style={{ width: 3, minHeight: 44, background: p.accent, borderRadius: 4, marginTop: 4, flexShrink: 0 }} />
                <div>
                  <h3 style={{ color: p.accent, fontFamily: "'Orbitron', monospace", fontSize: 15, fontWeight: 700, marginBottom: 4 }}>{p.text}</h3>
                  <p style={{ color: "#5a5a70", fontSize: 13 }}>{p.sub}</p>
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{ padding: "36px 24px", borderTop: "1px solid #ffffff06" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", flexWrap: "wrap", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <img src="scs-badge-transparent.png" alt="SCS" style={{ width: 24, height: 24, borderRadius: 7 }} />
            <span style={{ color: "#333", fontFamily: "'Orbitron', monospace", fontSize: 10, letterSpacing: "0.1em" }}>ARIOS — Suite Cascade System</span>
          </div>
          <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
            <a href="https://github.com/Phuire-Research/SuiteCascadeSystem" style={{ color: "#444", fontSize: 10, textDecoration: "none" }}>GitHub</a>
            <a href="https://github.com/Phuire-Research/Stratimux" style={{ color: "#444", fontSize: 10, textDecoration: "none" }}>Stratimux</a>
            <a href="https://scp-origin.com" style={{ color: "#444", fontSize: 10, textDecoration: "none" }}>SCP-Origin</a>
            <a href="muxonomy.html" style={{ color: "#4affcf88", fontSize: 10, textDecoration: "none" }}>Muxonomy</a>
            <span style={{ color: "#282830", fontSize: 10 }}>GPLv3</span>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SuiteCascadePOC />);
  </script>
</body>
</html>
